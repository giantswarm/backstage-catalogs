---
apiVersion: source.toolkit.fluxcd.io/v1beta2
kind: OCIRepository
metadata:
  name: ${{ values.name }}
  namespace: ${{ values.namespace }}
spec:
  {% if not values.editMode %}
  interval: 1h0m0s
  provider: generic
  url: oci://${{ values.chartRef }}
  {% endif %}
  ref:
    {% if values.automaticUpgrades === 'no-upgrades' %}
    tag: ${{ values.chartTag }}
    semver: null
    {% elif values.automaticUpgrades === 'patch-upgrades' %}
    tag: null
    semver: '~${{ values.chartTag }}'
    {% elif values.automaticUpgrades === 'minor-upgrades' %}
    tag: null
    semver: '^${{ values.chartTag }}'
    {% elif values.automaticUpgrades === 'major-upgrades' %}
    tag: null
    semver: '>=${{ values.chartTag }}'
    {% endif %}

---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ${{ values.name }}
  namespace: ${{ values.namespace }}
  {% if not values.editMode %}
  labels:
    giantswarm.io/cluster: ${{ values.clusterName }}
  {% endif %}
spec:
  {% if not values.editMode %}
  chartRef:
    kind: OCIRepository
    name: ${{ values.name }}
  install:
    createNamespace: true
  interval: 1h0m0s
  {% if not values.isManagementCluster %}
  kubeConfig:
    secretRef:
      name: ${{ values.clusterName }}-kubeconfig
  storageNamespace: ${{ values.targetNamespace }}
  {% endif %}
  releaseName: ${{ values.name }}
  targetNamespace: ${{ values.targetNamespace }}
  {% endif %}

  {% if values.inlineValues %}
  values:
    ${{ values.inlineValues | indent(4) }}
  {% else %}
  values: null
  {% endif %}
  
  {% set secretMap = values.secretValuesMap | fromJson %}
  {% set hasAnySource = false %}
  {% for src in values.valueSources %}
    {% if (src.kind === 'ConfigMap' and src.values) or (src.kind === 'Secret' and secretMap[src.name]) %}
      {% set hasAnySource = true %}
    {% endif %}
  {% endfor %}
  {% if hasAnySource %}
  valuesFrom:
    {% for src in values.valueSources %}
    {% if src.kind === 'ConfigMap' and src.values %}
    - kind: ConfigMap
      name: ${{ src.name }}
      valuesKey: values
    {% elif src.kind === 'Secret' and secretMap[src.name] %}
    - kind: Secret
      name: ${{ src.name }}
      valuesKey: values
    {% endif %}
    {% endfor %}
  {% else %}
  valuesFrom: null
  {% endif %}

{% set secretMap = values.secretValuesMap | fromJson %}
{% for src in values.valueSources %}
{% if src.kind === 'ConfigMap' and src.values %}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ${{ src.name }}
  namespace: ${{ values.namespace }}
data:
  values: |-
    ${{ src.values | indent(4) }}
{% elif src.kind === 'Secret' and secretMap[src.name] %}
---
apiVersion: v1
kind: Secret
metadata:
  name: ${{ src.name }}
  namespace: ${{ values.namespace }}
stringData:
  values: |-
    ${{ secretMap[src.name] | indent(4) }}
{% endif %}
{% endfor %}
