apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: edit-app-deployment
  title: Edit App Deployment
  description: Edit values, secrets, chart version, or upgrade strategy of an existing app deployment.
  labels:
    giantswarm.io/app-deployment-action: edit
  tags:
    - hidden
spec:
  owner: group:team-honeybadger
  type: resource
  parameters:
    - title: Deployment
      description: Here you can modify chart version and upgrade strategy.
      ui:ObjectFieldTemplate: GSStepLayout
      ui:options:
        formWidth: 1200
      required:
        - chartTag
      properties:
        deployment:
          type: object
          ui:field: GSMultiSourceDeploymentPicker
          ui:options:
            installationNameField: installation.installationName
            clusterNameField: cluster.clusterName
            clusterNamespaceField: cluster.clusterNamespace
            deploymentNameField: name
            deploymentNamespaceField: namespace
            secretValuesKey: SECRET_VALUES_MAP
          properties:
            currentValues:
              type: string
            currentValueSources:
              type: array
        chartTag:
          title: Version
          description: Select the chart version. The current version is pre-selected.
          type: string
          ui:field: GSChartTagPicker
          ui:options:
            chartRefField: chartRef
        automaticUpgrades:
          title: Automatic upgrades
          type: string
          enum:
            - no-upgrades
            - patch-upgrades
            - minor-upgrades
            - major-upgrades
          ui:enumNames:
            - No automatic upgrades
            - Automatic patch upgrades
            - Automatic minor and patch upgrades
            - Automatic major, minor and patch upgrades
          ui:widget: radio
    - title: Configuration
      description: Here you can edit the application's configuration.
      ui:ObjectFieldTemplate: GSStepLayout
      ui:options:
        configurationDocs:
          chartRefField: chartRef
          chartTagField: chartTag
      properties:
        valueSources:
          title: Value sources
          description: Add ConfigMap or Secret value sources. Order determines merge priority (last wins).
          type: array
          ui:field: GSValueSourcesEditor
          ui:options:
            secretsKey: SECRET_VALUES_MAP
            chartRefField: chartRef
            chartTagField: chartTag
            initialNamePrefixTemplate: '${{clusterNamePrefix(cluster)}}${{chartName(chartRef)}}'
            initialValueSourcesField: deployment.currentValueSources
            maxHeight: 600
        values:
          title: Inline values
          type: string
          ui:field: GSYamlValuesEditor
          ui:options:
            chartRefField: chartRef
            chartTagField: chartTag
            initialValueField: deployment.currentValues
            maxHeight: 600
        schemaValidation:
          type: boolean
          ui:field: GSYamlValuesValidation
          ui:options:
            chartRefField: chartRef
            chartTagField: chartTag
            valuesFields:
              - valueSources
              - values
            secretValuesKeys:
              - SECRET_VALUES_MAP
    - title: Output options
      ui:ObjectFieldTemplate: GSStepLayout
      ui:options:
        formWidth: 1200
      required:
        - action
      properties:
        action:
          title: Desired result
          type: string
          enum:
            - apply
            - template
          default: apply
          ui:enumNames:
            - Apply changes to the deployment
            - Display the manifest (e.g. for use in a GitOps repository)
          ui:widget: radio
      dependencies:
        action:
          allOf:
            - if:
                properties:
                  action:
                    const: apply
                required:
                  - action
              then:
                properties:
                  userToken:
                    type: object
                    ui:field: GSOIDCToken
                    ui:options:
                      secretsKey: USER_OIDC_TOKEN
                      installationNameField: installation.installationName
  steps:
    - id: fetchTemplate
      name: Template manifests
      action: fetch:template
      input:
        url: ./template
        values:
          name: ${{ parameters.name }}
          namespace: ${{ parameters.namespace or parameters.cluster.clusterNamespace }}
          chartTag: ${{ parameters.chartTag }}
          automaticUpgrades: ${{ parameters.automaticUpgrades }}
          valueSources: ${{ parameters.valueSources }}
          secretValuesMap: ${{ secrets.SECRET_VALUES_MAP }}
          inlineValues: ${{ parameters.values }}
          editMode: true
    - id: cleanup
      name: Clean up
      action: roadiehq:utils:fs:replace
      input:
        files:
          - file: manifest.yaml
            find: \n\s*\n
            replaceWith: "\n"
            matchRegex: true
    - id: parseFile
      name: Print manifests
      action: roadiehq:utils:fs:parse
      input:
        path: manifest.yaml
    - id: apply
      if: ${{ parameters.action == 'apply' }}
      action: kube:apply
      name: Apply to cluster
      input:
        namespaced: true
        clusterName: ${{ parameters.installation.installationName }}
        token: ${{ secrets.USER_OIDC_TOKEN }}
        manifest: ${{ steps.parseFile.output.content }}
  output:
    links:
      - title: Go to deployment
        url: /deployments/${{ parameters.installation.installationName }}/helmrelease/${{ parameters.cluster.clusterNamespace }}/${{ parameters.name }}
    text:
      - title: Manifests
        content: |
          ```yaml
          ${{ steps.parseFile.output.content }}
          ```
