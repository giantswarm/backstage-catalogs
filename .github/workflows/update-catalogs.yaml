name: Update catalogs

on:
  schedule:
    - cron: "50 5,16 * * MON-FRI"
  workflow_dispatch:
    inputs:
      force: 
        description: Even run if workflow ran recently
        type: boolean
        required: false

# We want only one instance of this workflow to run at a time.
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  update:
    name: Update
    runs-on: ubuntu-24.04
    steps:

      - name: Clone github repository
        run: |
          git clone https://oauth2:${{ secrets.TAYLORBOT_GITHUB_ACTION }}@github.com/giantswarm/backstage-catalogs.git clonedir

      # This step requires the cloned repo, so it has to come second.
      - name: Download state if available
        working-directory: clonedir
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo $(gh run download -n state)

      - name: Calculate time since last completion
        working-directory: clonedir
        run: |
          if [ -f update-catalog-state.txt ]; then
            last_run=$(cat update-catalog-state.txt)
            now=$(date +"%s")
            diff=$((now - last_run))
            echo "age=$diff" >> $GITHUB_ENV
          else
            # We just make up a high number here to force a workflow completion
            echo "age=99999" >> $GITHUB_ENV
          fi
          rm -f update-catalog-state.txt

      - name: Check if this workflow is due to run
        shell: bash
        run: |
          # We want to run this no more than once every two hours (7200 sec)
          if [[ '${{ github.event_name }}' == 'workflow_dispatch' ]] && [[ '${{ inputs.force }}' == 'true' ]]; then
            echo "Forcing workflow run."
            echo "workflow_due=true" >> $GITHUB_ENV
          elif [ ${{ env.age }} -gt 7000 ]; then
            echo "Workflow is due (last execution ${{ env.age }} seconds ago)."
            echo "workflow_due=true" >> $GITHUB_ENV
          fi

      - name: Switch branch
        if: env.workflow_due == 'true'
        working-directory: clonedir
        run: |
          git switch -c update-catalogs

      - name: Install backstage-catalog-importer
        if: env.workflow_due == 'true'
        uses: giantswarm/install-binary-action@5bef88f65012037dd836117c8d344b21bb559854 # v4.1.0
        with:
          binary: backstage-catalog-importer
          # renovate: datasource=github-releases depName=giantswarm/backstage-catalog-importer versioning=loose
          version: 0.29.5
          # Since v0.29.1 the release asset is an uncompressed binary. The URL has no
          # file extension, so install-binary-action skips unarchiving and installs it directly.
          download_url: https://github.com/giantswarm/${binary}/releases/download/v${version}/${binary}-linux-amd64
          smoke_test: ${binary} --help

      - name: Execute backstage-catalog-importer
        if: env.workflow_due == 'true'
        working-directory: clonedir
        env:
          GITHUB_TOKEN: ${{ secrets.TAYLORBOT_GITHUB_ACTION }}
          PERSONIO_CLIENT_ID: ${{ secrets.PERSONIO_CLIENT_ID }}
          PERSONIO_CLIENT_SECRET: ${{ secrets.PERSONIO_CLIENT_SECRET }}
        run: |
          backstage-catalog-importer charts \
            gsoci.azurecr.io \
            --prefix charts/giantswarm/ \
            --output ./catalogs

          # CRDs
          cat <<EOF | backstage-catalog-importer crd --output ./catalogs -
          - url: https://github.com/giantswarm/apiextensions-application/blob/main/config/crd/application.giantswarm.io_apps.yaml
            owner: group:default/team-honeybadger
            lifecycle: production
            system: app-platform
          - url: https://github.com/giantswarm/apiextensions-application/blob/main/config/crd/application.giantswarm.io_catalogs.yaml
            owner: group:default/team-honeybadger
            lifecycle: deprecated
            system: app-platform
          - url: https://github.com/giantswarm/silence-operator/blob/main/config/crd/bases/monitoring.giantswarm.io_silences.yaml
            owner: group:default/team-atlas
            lifecycle: production
            system: observability-platform
          - url: https://github.com/giantswarm/silence-operator/blob/main/config/crd/bases/observability.giantswarm.io_silences.yaml
            owner: group:default/team-atlas
            lifecycle: production
            system: observability-platform
          - url: https://github.com/giantswarm/observability-operator/blob/main/config/crd/bases/observability.giantswarm.io_grafanaorganizations.yaml
            owner: group:default/team-atlas
            lifecycle: production
            system: observability-platform
          - url: https://github.com/giantswarm/organization-operator/blob/main/config/crd/bases/security.giantswarm.io_organizations.yaml
            owner: group:default/team-shield
            lifecycle: production
          - url: https://github.com/giantswarm/rbac-operator/blob/main/config/crd/auth.giantswarm.io_rolebindingtemplates.yaml
            owner: group:default/team-shield
            lifecycle: production
          - url: https://github.com/giantswarm/kyverno-policy-operator/blob/main/config/crd/bases/kyverno.io_clusterpolicies.yaml
            owner: group:default/team-shield
            lifecycle: production
          - url: https://github.com/giantswarm/kyverno-policy-operator/blob/main/config/crd/bases/kyverno.io_policyexceptions.yaml
            owner: group:default/team-shield
            lifecycle: production
          - url: https://github.com/giantswarm/kyverno-policy-operator/blob/main/config/crd/bases/policy.giantswarm.io_policyexceptions.yaml
            owner: group:default/team-shield
            lifecycle: production
          - url: https://github.com/giantswarm/kyverno-policy-operator/blob/main/config/crd/bases/policy.giantswarm.io_policymanifests.yaml
            owner: group:default/team-shield
            lifecycle: production
          - url: https://github.com/giantswarm/exception-recommender/blob/main/config/crd/bases/policy.giantswarm.io_automatedexceptions.yaml
            owner: group:default/team-shield
            lifecycle: production
          - url: https://github.com/giantswarm/exception-recommender/blob/main/config/crd/bases/policy.giantswarm.io_policies.yaml
            owner: group:default/team-shield
            lifecycle: production
          - url: https://github.com/giantswarm/exception-recommender/blob/main/config/crd/bases/policy.giantswarm.io_policyconfigs.yaml
            owner: group:default/team-shield
            lifecycle: production
          - url: https://github.com/giantswarm/exception-recommender/blob/main/config/crd/bases/policy.giantswarm.io_policyexceptiondrafts.yaml
            owner: group:default/team-shield
            lifecycle: production
          - url: https://github.com/giantswarm/exception-recommender/blob/main/config/crd/bases/policy.giantswarm.io_policyexceptions.yaml
            owner: group:default/team-shield
            lifecycle: production
          - url: https://github.com/giantswarm/exception-recommender/blob/main/config/crd/bases/policy.giantswarm.io_policymanifests.yaml
            owner: group:default/team-shield
            lifecycle: production
          - url: https://github.com/giantswarm/konfigure-operator/blob/main/config/crd/bases/konfigure.giantswarm.io_konfigurations.yaml
            owner: group:default/team-honeybadger
            lifecycle: production
          - url: https://github.com/giantswarm/konfigure-operator/blob/main/config/crd/bases/konfigure.giantswarm.io_konfigurationschemas.yaml
            owner: group:default/team-honeybadger
            lifecycle: production
          EOF

          ls -la ./catalogs

          echo "looked_for_changes=true" >> $GITHUB_ENV

          # End here if nothing changed
          if [ -z "$(git status --porcelain)" ]; then
            echo "changes_exist=false" >> $GITHUB_ENV
            echo "No changes found. Next steps will be skipped."
          else
            echo "changes_exist=true" >> $GITHUB_ENV
          fi

      - name: Ping heartbeat
        if: env.workflow_due == 'true'
        env:
          CRONITOR_HEARTBEAT_ID: ${{ secrets.CRONITOR_HEARTBEAT_ID }}
        run: |
          curl -X GET https://cronitor.link/p/${CRONITOR_HEARTBEAT_ID}

      - name: Create and merge pull request in github
        if: env.changes_exist == 'true'
        run: |
          # Configure identity and log in
          git config --global user.email "action@github.com"
          git config --global user.name "github-actions"
          echo ${{ secrets.TAYLORBOT_GITHUB_ACTION }} > ./token
          gh auth login --with-token < ./token

          cd clonedir
          
          git add -A
          git commit -a -m "chore: update catalog data"
          git push -f origin update-catalogs

          # Check if there is an open PR (in a subshell)
          set +e
          pr_exists=$(gh pr view --json state --jq .state | grep "OPEN")
          if [ $? -eq 0 ]; then
            echo "An open PR exists already"
            set -e
            gh pr view
          else
            echo "No open PR exists"
            set -e
            # Create a PR
            gh pr create \
              --repo giantswarm/backstage-catalogs \
              --head update-catalogs \
              --title "chore: update catalog data" \
              --body "This PR is created automatically from the workflow .github/workflows/update-catalogs.yaml. It should also get approved and merged automatically." \
              --assignee architectbot
          fi

          # Set the PR to merge automatically after checks and reviews are in place          
          gh pr merge \
            --squash \
            --body "" \
            --auto \
            --delete-branch

          # Approve as different user
          if [ -z "${{ secrets.ARCHITECT_GITHUB_REPO_SYNC_TOKEN }}" ]; then
            echo "No ARCHITECT_GITHUB_REPO_SYNC_TOKEN found. Skipping PR approval."
          else
            echo ${{ secrets.ARCHITECT_GITHUB_REPO_SYNC_TOKEN }} > ./token
            gh auth login --with-token < ./token
            gh pr review --approve
          fi

      - name : Create state file
        if: env.looked_for_changes == 'true'
        shell: bash
        run: |
          date +"%s" > update-catalog-state.txt

      - name: Persist state file
        if: env.looked_for_changes == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: state
          path: update-catalog-state.txt
          retention-days: 1
